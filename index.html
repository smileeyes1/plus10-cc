<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🧙‍♂️ أسطورة الحكيم نور</title>

<style>
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:linear-gradient(#081a30,#0f2d4f);
  color:#fff;
  text-align:center;
}

.fullscreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(#061628,#0a1f38);
}

.box{
  width:520px;
  margin:30px auto;
  padding:25px;
  border-radius:22px;
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 30px #00eaff;
}

button{
  padding:12px 30px;
  font-size:20px;
  border-radius:14px;
  background:#00eaff;
  border:none;
  cursor:pointer;
  margin:6px;
}

input{
  font-size:22px;
  padding:10px;
  width:200px;
  border-radius:10px;
  text-align:center;
}

.math{font-size:30px;margin:15px 0;color:#ffe066}
.hearts span{font-size:32px;animation:pulse 1s infinite}
#mentor{color:#ffd166;font-size:20px;margin:10px}
#story{color:#06d6a0;font-size:18px;margin:10px}
#msg{min-height:120px;font-size:20px;white-space:pre-line}

.soft{background:#ffd166;color:#000}
.star{background:#ffe066;color:#000}
.next{background:#06d6a0;color:#000}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<!-- المقدمة -->
<div id="intro" class="fullscreen">
  <h1>🌱 أهلاً أيها البطل</h1>
  <p style="font-size:22px;line-height:1.8">
    🧮 الحساب رحلة<br>
    🧠 التفكير قوة<br>
    🧙‍♂️ والحكيم نور سيرافقك
  </p>
  <button onclick="startGame()">🚀 ابدأ الرحلة</button>
</div>

<!-- اللعبة -->
<div id="game" class="box" style="display:none">

<h2>🧙‍♂️ أسطورة الحكيم نور</h2>

<div id="story"></div>
<div id="mentor"></div>

<div>⭐ النقاط: <span id="score">٠</span></div>

<div id="question"></div>

<input id="answer" type="number" placeholder="اكتب الجواب">
<br>
<button onclick="attack()">💡 أجيب</button>
<br>

<button id="rethinkBtn" class="soft" style="display:none" onclick="smartHint()">🤔 نفكّر</button>
<button id="starBtn" class="star" style="display:none" onclick="giveStar()">⭐ حكمة</button>
<button id="nextBtn" class="next" style="display:none" onclick="nextStep()">➡️ نكمل</button>

<div id="msg"></div>

</div>

<script>
const intro=document.getElementById("intro");
const game=document.getElementById("game");
const question=document.getElementById("question");
const answer=document.getElementById("answer");
const scoreSpan=document.getElementById("score");
const mentorBox=document.getElementById("mentor");
const storyBox=document.getElementById("story");
const msgBox=document.getElementById("msg");
const rethinkBtn=document.getElementById("rethinkBtn");
const starBtn=document.getElementById("starBtn");
const nextBtn=document.getElementById("nextBtn");

let x=1,y=1;
let score=0;
let level=1;
let streak=0;
let mistakeMemory={};

const mentorWisdom=[
 "🧙‍♂️ نور: البطل الحقيقي يفكّر",
 "🧙‍♂️ نور: الخطأ باب فهم",
 "🧙‍♂️ نور: لا نسرع… نعدّ"
];

function arabic(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}

function hearts(n){
  let h="";
  for(let i=0;i<n;i++) h+="<span>❤️</span> ";
  return h;
}

function storyProgress(){
  if(score>=150) return "👑 أصبحت تلميذ الحكيم الأعلى";
  if(score>=100) return "🐉 هزمت وحش الشك";
  if(score>=50) return "🏰 دخلت قصر الحكمة";
  return "🌱 بداية الرحلة";
}

function mentorSpeak(text){
  mentorBox.textContent=text ||
    mentorWisdom[Math.floor(Math.random()*mentorWisdom.length)];
}

function startGame(){
  intro.style.display="none";
  game.style.display="block";
  newQuestion();
}

function newQuestion(){
  rethinkBtn.style.display="none";
  starBtn.style.display="none";
  nextBtn.style.display="none";
  answer.value="";
  msgBox.textContent="";

  mentorSpeak();
  storyBox.textContent=storyProgress();

  let max=Math.min(10,3+level*2);
  x=Math.floor(Math.random()*max)+1;
  y=Math.floor(Math.random()*(max-x+1));

  question.innerHTML=`
    <div class="math">${arabic(x)} + ${arabic(y)} = ؟</div>
    <div>${hearts(x)} + ${hearts(y)}</div>
  `;
}

function smartHint(){
  mentorSpeak("🧙‍♂️ نور: لنعدّ معًا بهدوء");
  question.innerHTML=`
    <p>عدد القلوب الأولى: ${arabic(x)}</p>
    ${hearts(x)}
    <p>ثم أضفنا: ${arabic(y)}</p>
    ${hearts(y)}
    <p>🧠 كم المجموع؟</p>
  `;
}

function giveStar(){
  msgBox.textContent=
`⭐ نجمة حكمة ⭐
أنت لا تجيب فقط
أنت تفكّر
وهذا سر الأبطال`;
}

function attack(){
  let ans=parseInt(answer.value);
  if(isNaN(ans)) return;

  let key=`${x}+${y}`;
  mistakeMemory[key]=(mistakeMemory[key]||0);

  if(ans===x+y){
    score+=10;
    streak++;
    mistakeMemory[key]=0;
    scoreSpan.textContent=arabic(score);

    mentorSpeak("🧙‍♂️ نور: أحسنت… فهمك يزداد");

    if(streak>=3){
      starBtn.style.display="inline-block";
      msgBox.textContent="🏆 ثلاث إجابات بتفكير هادئ";
      streak=0;
    }else{
      msgBox.textContent="✅ صحيح… والأهم أنك فكّرت 🧠";
      setTimeout(newQuestion,1200);
    }
  }else{
    streak=0;
    mistakeMemory[key]++;
    mentorSpeak("🧙‍♂️ نور: لا بأس… كل خطأ معلم");

    rethinkBtn.style.display="inline-block";
    nextBtn.style.display="inline-block";

    msgBox.textContent=
      mistakeMemory[key]>=2
      ? "🧠 لاحظت أنك تحاول مرة أخرى… هذا رائع"
      : "🌱 المحاولة شجاعة";
  }
}

function nextStep(){
  starBtn.style.display="inline-block";
  newQuestion();
}
</script>

</body>
</html>
