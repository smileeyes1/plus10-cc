<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🧙‍♂️ أسطورة الحكيم نور</title>

<style>
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:linear-gradient(#081a30,#0f2d4f);
  color:#fff;
  text-align:center;
}
.fullscreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.box{
  width:540px;
  max-width:95%;
  margin:30px auto;
  padding:25px;
  border-radius:22px;
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 30px #00eaff;
}
button{
  padding:12px 26px;
  font-size:18px;
  border-radius:14px;
  background:#00eaff;
  border:none;
  cursor:pointer;
  margin:6px;
}
button:hover{transform:scale(1.05)}
.math{font-size:34px;color:#ffe066}
.hearts span{font-size:28px}
.mentor{color:#ffd166;font-size:20px;min-height:40px}
.story{color:#06d6a0;font-size:18px;margin-bottom:10px}
.msg{min-height:120px;font-size:18px;white-space:pre-line}
.reset{background:#ef476f}
.reflect{background:#9bf6ff;color:#000}
input{
  padding:10px;
  font-size:18px;
  border-radius:12px;
  border:none;
  width:160px;
  text-align:center;
}
</style>
</head>

<body>

<!-- البداية -->
<div id="intro" class="fullscreen">
  <h1>🧙‍♂️ أسطورة الحكيم نور</h1>
  <p style="font-size:22px">
    الحساب فهم 🧮<br>
    التفكير قوة 🧠<br>
    الحكمة رحلة ✨<br><br>
    برفقة المعلم 👨‍🏫 <b>محمد وجيه</b>
  </p>
  <button onclick="startLesson()">🚀 ابدأ الرحلة</button>
</div>

<!-- الدرس -->
<div id="lesson" class="box" style="display:none">
  <h2>📜 درس الحكمة</h2>
  <div id="lessonMentor" class="mentor"></div>
  <div id="lessonMsg" class="msg"></div>
  <button onclick="startGame()">🎮 ابدأ التحدي</button>
</div>

<!-- اللعبة -->
<div id="game" class="box" style="display:none">
  <h2>🌟 رحلة الحكمة</h2>
  <div id="gameStory" class="story"></div>
  <div id="gameMentor" class="mentor"></div>

  ⭐ النقاط: <span id="score">٠</span> |
  🎚 المستوى: <span id="level">١</span>

  <div id="question"></div>

  <input id="answer" placeholder="الجواب"
         inputmode="numeric"
         pattern="[٠-٩0-9]*">

  <br><br>
  <button onclick="attack()">💡 أجيب</button>
  <button class="reflect" onclick="reflect()">🧠 أفكر</button>

  <div id="gameMsg" class="msg"></div>

  <button class="reset" onclick="resetProgress()">🔄 تصفير</button>
</div>

<script>
/* ===== أدوات ===== */
function arabic(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}
function toEng(s){
  return s.replace(/[٠-٩]/g,d=>"0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)]);
}
function hearts(n){
  return "<span>❤️</span>".repeat(n);
}

/* ===== الحالة ===== */
let state={score:0,level:1,streak:0,fails:0};
let x=1,y=1;

/* ===== الحكم ===== */
const wisdom=[
 "التأني طريق الإتقان",
 "كل مسألة خطوة للأمام",
 "العقل يكبر بالمحاولة",
 "الهدوء يصنع الحل",
 "أنت تتعلم الآن"
];

/* ===== حفظ التقدم ===== */
function save(){
  localStorage.setItem("wisdomState",JSON.stringify(state));
}
function load(){
  const s=localStorage.getItem("wisdomState");
  if(s) state=JSON.parse(s);
}

/* ===== عناصر DOM ===== */
const intro=document.getElementById("intro");
const lesson=document.getElementById("lesson");
const game=document.getElementById("game");
const gameMentor=document.getElementById("gameMentor");
const gameMsg=document.getElementById("gameMsg");
const question=document.getElementById("question");
const answer=document.getElementById("answer");
const scoreSpan=document.getElementById("score");
const levelSpan=document.getElementById("level");
const storyBox=document.getElementById("gameStory");

/* ===== بدء الدرس ===== */
function startLesson(){
  intro.style.display="none";
  lesson.style.display="block";
  document.getElementById("lessonMentor").textContent="👨‍🏫 سنفكر معًا بهدوء";
  document.getElementById("lessonMsg").innerHTML=
    hearts(3)+" + "+hearts(2);
}

/* ===== دخول اللعبة ===== */
function startGame(){
  load();
  lesson.style.display="none";
  game.style.display="block";
  updateUI();
  newQuestion();
}

/* ===== القصة ===== */
function updateStory(){
  storyBox.textContent=
    state.level<3 ? "🌱 بداية طريق الحكمة" :
    state.level<6 ? "🏞️ رحلة الحكيم" :
    state.level<9 ? "🌄 تحدي العقول" :
    "🏰 وصلت قصر الحكمة";
}

/* ===== سؤال جديد ===== */
function newQuestion(){
  answer.value="";
  gameMsg.textContent="";
  x=Math.floor(Math.random()*(3+state.level*2))+1;
  y=Math.floor(Math.random()*(3+state.level*2))+1;

  updateStory();
  gameMentor.textContent="🧙‍♂️ "+
    wisdom[Math.floor(Math.random()*wisdom.length)];

  question.innerHTML=
    `<div class="math">${arabic(x)} + ${arabic(y)} = ؟</div>
     <div class="hearts">${hearts(x)} + ${hearts(y)}</div>`;
}

/* ===== التفكير ===== */
function reflect(){
  gameMsg.innerHTML=
    hearts(x)+"<br>ثم أضف<br>"+hearts(y);
}

/* ===== الإجابة ===== */
function attack(){
  if(answer.value.trim()===""){
    gameMsg.textContent="✋ اكتب الإجابة أولًا";
    return;
  }
  const val=parseInt(toEng(answer.value));
  if(isNaN(val)) return;

  if(val===x+y){
    state.score+=10;
    state.streak++;
    state.fails=0;

    gameMsg.textContent="✨ إجابة صحيحة! أحسنت ✨";

    if(state.streak>=3){
      state.level++;
      state.streak=0;
      gameMsg.textContent="🏆 ممتاز! مستوى جديد!";
    }

    save();
    updateUI();
    setTimeout(newQuestion,900);
  }else{
    state.fails++;
    state.streak=0;
    gameMentor.textContent="👨‍🏫 لا بأس، حاول بهدوء";

    if(state.fails>=3){
      gameMentor.textContent="👨‍🏫 تعال نفكر معًا";
      reflect();
    }
  }
}

/* ===== تحديث الواجهة ===== */
function updateUI(){
  scoreSpan.textContent=arabic(state.score);
  levelSpan.textContent=arabic(state.level);
}

/* ===== إعادة ===== */
function resetProgress(){
  localStorage.removeItem("wisdomState");
  location.reload();
}
</script>

</body>
</html>
