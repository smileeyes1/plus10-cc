<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🧙‍♂️ أسطورة الحكيم نور</title>

<style>
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:linear-gradient(#081a30,#0f2d4f);
  color:#fff;
  text-align:center;
}

.fullscreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.box{
  width:540px;
  max-width:95%;
  margin:30px auto;
  padding:25px;
  border-radius:22px;
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 30px #00eaff;
}

button{
  padding:12px 26px;
  font-size:18px;
  border-radius:14px;
  background:#00eaff;
  border:none;
  cursor:pointer;
  margin:6px;
}

.math{font-size:34px;margin:15px 0;color:#ffe066}
.hearts span{font-size:30px}

#mentor{color:#ffd166;font-size:20px;margin:14px;min-height:45px}
#story{color:#06d6a0;font-size:18px;margin:8px}
#msg{min-height:150px;font-size:18px;white-space:pre-line}

.soft{background:#ffd166;color:#000}
.next{background:#06d6a0;color:#000}
.reset{background:#ef476f;color:#000}
.reflect{background:#9bf6ff;color:#000}
.success{animation:glow 0.6s ease-in-out 2}

@keyframes glow{
  0%{box-shadow:0 0 10px #00eaff}
  50%{box-shadow:0 0 40px #ffd166}
  100%{box-shadow:0 0 10px #00eaff}
}
</style>
</head>

<body>

<!-- المقدمة -->
<div id="intro" class="fullscreen">
  <h1>🧙‍♂️ أسطورة الحكيم نور</h1>
  <p style="font-size:22px;line-height:1.8">
    🧮 الحساب فهم<br>
    🧠 التفكير قوة<br>
    ✨ الحكمة رحلة
  </p>
  <button onclick="startLesson()">🚀 ابدأ الرحلة</button>
</div>

<!-- التمهيد -->
<div id="lesson" class="box" style="display:none">
  <h2>📜 درس الحكمة</h2>
  <div id="mentor"></div>
  <div id="msg"></div>
  <button id="lessonBtn" onclick="nextLesson()">➡️ تابع</button>
</div>

<!-- اللعبة -->
<div id="game" class="box" style="display:none">
  <h2>🌟 رحلة الحكمة</h2>
  <div id="story"></div>
  <div id="mentor"></div>

  <div>
    ⭐ النقاط: <span id="score">٠</span>
    &nbsp; | &nbsp;
    🎚 المستوى: <span id="level">١</span>
  </div>

  <div id="question"></div>
  <input id="answer" type="number" placeholder="اكتب الجواب">
  <br>

  <button onclick="attack()">💡 أجيب</button>
  <button class="reflect" onclick="reflect()">🧠 أفكر أولًا</button>

  <div id="msg"></div>

  <hr>
  <button class="reset" onclick="resetProgress()">🔄 تصفير التقدم</button>
</div>

<script>
/* ===== الحالة ===== */
let state={score:0,level:1,streak:0};

/* ===== تحميل / حفظ ===== */
function load(){
  let s=localStorage.getItem("noorState");
  if(s) state=JSON.parse(s);
}
function save(){
  localStorage.setItem("noorState",JSON.stringify(state));
}

/* ===== عناصر ===== */
const intro=intro=document.getElementById("intro");
const lesson=document.getElementById("lesson");
const game=document.getElementById("game");
const mentorBox=document.getElementById("mentor");
const msgBox=document.getElementById("msg");
const scoreSpan=document.getElementById("score");
const levelSpan=document.getElementById("level");
const question=document.getElementById("question");
const answer=document.getElementById("answer");
const storyBox=document.getElementById("story");

/* ===== أدوات ===== */
function arabic(n){return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);}
function hearts(n){return "<span>❤️</span>".repeat(n);}

/* ===== الحكيم ===== */
function mentor(text){
  mentorBox.textContent="🧙‍♂️ نور: "+text;
}

/* ===== التمهيد ===== */
let lessonStep=0;
function startLesson(){
  intro.style.display="none";
  lesson.style.display="block";
  nextLesson();
}
function nextLesson(){
  lessonStep++;
  if(lessonStep===1){
    mentor("الفهم أهم من السرعة");
    msgBox.textContent="🌱 نحن لا نخمن… نحن نعد";
  }else if(lessonStep===2){
    mentor("انظر إلى القلوب");
    msgBox.innerHTML=hearts(3);
  }else if(lessonStep===3){
    mentor("نضيف بهدوء");
    msgBox.innerHTML=hearts(3)+" + "+hearts(2);
  }else{
    mentor("أنت مستعد");
    msgBox.textContent="✨ الرحلة تبدأ الآن";
    lessonBtn.textContent="🎮 ابدأ التحدي";
    lessonBtn.onclick=startGame;
  }
}

/* ===== اللعبة ===== */
let x=1,y=1;

function startGame(){
  lesson.style.display="none";
  game.style.display="block";
  load();
  updateUI();
  newQuestion();
}

function newQuestion(){
  answer.value="";
  let max=3+state.level*2;
  x=Math.floor(Math.random()*max)+1;
  y=Math.floor(Math.random()*(max-x))+1; // لا صفر

  mentor("فكر قبل أن تجيب");
  storyBox.textContent="🌱 المعرفة تنمو بالتأمل";

  question.innerHTML=`
    <div class="math">${arabic(x)} + ${arabic(y)} = ؟</div>
    <div>${hearts(x)} + ${hearts(y)}</div>
  `;
}

/* ===== التفكير ===== */
function reflect(){
  mentor("قسّم المسألة");
  msgBox.innerHTML=
    hearts(x)+"<br>ثم أضف إليها<br>"+hearts(y);
}

/* ===== التحقق ===== */
function attack(){
  let ans=parseInt(answer.value);
  if(ans===x+y){
    state.score+=10;
    state.streak++;
    mentor("أحسنت");
    msgBox.textContent="✅ إجابة صحيحة";
    game.classList.add("success");

    if(state.streak>=3){
      state.level++;
      state.streak=0;
      msgBox.textContent+="\n🎉 الحكيم فخور بك!";
    }

    save();
    setTimeout(()=>{
      game.classList.remove("success");
      newQuestion();
    },900);

  }else{
    state.streak=0;
    mentor("لا بأس");
    msgBox.textContent="🌱 نعد مرة أخرى بهدوء";
  }

  updateUI();
}

function updateUI(){
  scoreSpan.textContent=arabic(state.score);
  levelSpan.textContent=arabic(state.level);
}

/* ===== إعادة ===== */
function resetProgress(){
  localStorage.removeItem("noorState");
  location.reload();
}
</script>

</body>
</html>
