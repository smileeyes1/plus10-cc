<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🧙‍♂️ أسطورة الحكيم نور</title>

<style>
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:linear-gradient(#081a30,#0f2d4f);
  color:#fff;
  text-align:center;
}

.fullscreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.box{
  width:520px;
  max-width:95%;
  margin:30px auto;
  padding:25px;
  border-radius:22px;
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 30px #00eaff;
}

button{
  padding:12px 26px;
  font-size:18px;
  border-radius:14px;
  background:#00eaff;
  border:none;
  cursor:pointer;
  margin:6px;
}

.math{font-size:32px;margin:15px 0;color:#ffe066}
.hearts span{font-size:28px}

#mentor{color:#ffd166;font-size:20px;margin:12px;min-height:40px}
#story{color:#06d6a0;font-size:18px;margin:8px}
#msg{min-height:140px;font-size:18px;white-space:pre-line}

.soft{background:#ffd166;color:#000}
.next{background:#06d6a0;color:#000}
.reset{background:#ef476f;color:#000}
.reflect{background:#9bf6ff;color:#000}
</style>
</head>

<body>

<!-- المقدمة -->
<div id="intro" class="fullscreen">
  <h1>🧙‍♂️ أسطورة الحكيم نور</h1>
  <p style="font-size:22px;line-height:1.8">
    🧮 الحساب فهم<br>
    🧠 التفكير قوة<br>
    ✨ الحكمة رحلة
  </p>
  <button onclick="startLesson()">🚀 ابدأ الرحلة</button>
</div>

<!-- التمهيد التعليمي -->
<div id="lesson" class="box" style="display:none">

<h2>📜 درس الحكمة</h2>
<div id="mentor"></div>
<div id="msg"></div>

<button id="lessonBtn" onclick="nextLesson()">➡️ تابع</button>

</div>

<!-- اللعبة -->
<div id="game" class="box" style="display:none">

<h2>🌟 رحلة الحكمة</h2>
<div id="story"></div>
<div id="mentor"></div>

<div>
⭐ النقاط: <span id="score">٠</span>
&nbsp; | &nbsp;
🎚 المستوى: <span id="level">١</span>
</div>

<div id="question"></div>
<input id="answer" type="number" placeholder="اكتب الجواب">
<br>

<button onclick="attack()">💡 أجيب</button>
<button class="reflect" onclick="reflect()">🧠 أفكر أولًا</button>

<div id="msg"></div>

<hr>
<button class="reset" onclick="resetProgress()">🔄 تصفير التقدم</button>

</div>

<script>
/* ===== الحالة ===== */
let state={score:0,level:1,streak:0};

/* ===== عناصر ===== */
const intro=document.getElementById("intro");
const lesson=document.getElementById("lesson");
const game=document.getElementById("game");
const mentorBox=document.getElementById("mentor");
const msgBox=document.getElementById("msg");
const scoreSpan=document.getElementById("score");
const levelSpan=document.getElementById("level");
const question=document.getElementById("question");
const answer=document.getElementById("answer");
const storyBox=document.getElementById("story");

/* ===== أدوات ===== */
function arabic(n){return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);}
function hearts(n){return "❤️ ".repeat(n);}

/* ===== الحكيم ===== */
function mentor(text){
  mentorBox.textContent="🧙‍♂️ نور: "+text;
}

/* ===== التمهيد الذكي ===== */
let lessonStep=0;

function startLesson(){
  intro.style.display="none";
  lesson.style.display="block";
  nextLesson();
}

function nextLesson(){
  lessonStep++;

  if(lessonStep===1){
    mentor("قبل أن تحسب، يجب أن تفهم.");
    msgBox.textContent=
`🌱 عندما نُضيف
فنحن نجمع أشياء متفرقة
في مكان واحد`;
  }

  else if(lessonStep===2){
    mentor("انظر… هذه مجموعة أولى");
    msgBox.innerHTML=`${hearts(3)}<br>هل عددها واضح؟`;
  }

  else if(lessonStep===3){
    mentor("والآن نضيف إليها مجموعة ثانية");
    msgBox.innerHTML=`${hearts(3)} + ${hearts(2)}`;
  }

  else if(lessonStep===4){
    mentor("الذكاء لا يسرع… بل يعد بهدوء");
    msgBox.textContent=
`نعد جميع القلوب
قلب قلب
حتى نصل للحقيقة`;
  }

  else{
    mentor("الآن … أنت مستعد للرحلة");
    msgBox.textContent="✨ الفهم يسبق الإجابة";
    document.getElementById("lessonBtn").textContent="🎮 ابدأ التحدي";
    document.getElementById("lessonBtn").onclick=startGame;
  }
}

/* ===== بدء اللعبة ===== */
let x=1,y=1;

function startGame(){
  lesson.style.display="none";
  game.style.display="block";
  newQuestion();
}

function newQuestion(){
  answer.value="";
  let max=3+state.level*2;
  x=Math.floor(Math.random()*max)+1;
  y=Math.floor(Math.random()*(max-x+1));

  mentor("خذ نفسًا… ثم فكّر");
  storyBox.textContent="🌱 رحلة الفهم مستمرة";

  question.innerHTML=`
    <div class="math">${arabic(x)} + ${arabic(y)} = ؟</div>
    <div>${hearts(x)} + ${hearts(y)}</div>
  `;
}

/* ===== التفكير ===== */
function reflect(){
  mentor("ما أول خطوة؟ العد أم التخمين؟");
  msgBox.textContent="🧠 الحكيم يرى الطريق قبل أن يمشيه";
}

/* ===== التحقق ===== */
function attack(){
  let ans=parseInt(answer.value);
  if(ans===x+y){
    state.score+=10;
    state.streak++;
    mentor("أحسنت… الفهم ينمو");
    msgBox.textContent="✅ إجابة صحيحة";
    if(state.streak>=3){
      state.level++;
      state.streak=0;
      msgBox.textContent+="\n🌟 ترقيت بالمستوى";
    }
    setTimeout(newQuestion,1000);
  }else{
    state.streak=0;
    mentor("لا بأس… نعد بهدوء من جديد");
    msgBox.textContent="🌱 الخطأ تدريب للعقل";
  }

  scoreSpan.textContent=arabic(state.score);
  levelSpan.textContent=arabic(state.level);
}

/* ===== إعادة ===== */
function resetProgress(){location.reload();}
</script>

</body>
</html>
