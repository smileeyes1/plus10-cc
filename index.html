<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🧙‍♂️ أسطورة الحكيم نور – الجمع حتى ١٠</title>

<style>
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:radial-gradient(circle at top,#1b4965,#081a30);
  color:#fff;
  text-align:center;
  overflow:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/7bKQ7mP.png");
  opacity:0.15;
  animation: floatStars 80s linear infinite;
  pointer-events:none;
}
@keyframes floatStars{
  from{background-position:0 0;}
  to{background-position:-1500px 1500px;}
}
.fullscreen{
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
}
.box{
  width:560px; max-width:95%;
  margin:30px auto; padding:22px;
  border-radius:22px;
  background:rgba(255,255,255,0.1);
  box-shadow:0 0 30px #00eaff;
}
button{
  padding:12px 26px; font-size:18px;
  border-radius:14px;
  background:#00eaff; border:none;
  cursor:pointer; margin:6px;
}
button:hover{transform:scale(1.05)}
.reset{background:#ef476f}
.help{background:#ffd166;color:#000}
.report{background:#9bf6ff;color:#000}
.math{font-size:34px;color:#ffe066;margin:10px 0}
.mentor{color:#ffd166;font-size:20px;min-height:40px;margin:8px}
.story{color:#06d6a0;font-size:20px;margin-bottom:10px}
.msg{min-height:120px;font-size:18px;white-space:pre-line}
input{
  padding:10px;font-size:18px;
  border-radius:12px;border:none;
  width:160px;text-align:center;
}
.hearts span{
  font-size:28px; display:inline-block;
  animation: sparkle 1.5s infinite;
}
.hearts span:nth-child(even){animation-delay:.6s}
@keyframes sparkle{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}
.reportBox{
  background:rgba(0,0,0,0.45);
  padding:15px;border-radius:16px;
  margin-top:15px; display:none;
}
</style>
</head>

<body>

<!-- التسجيل -->
<div id="register" class="fullscreen">
  <h1>📖 سجلّ الرحلة</h1>
  <p>👦 اسم الطالب</p>
  <input id="studentName">
  <p>👨‍👩‍👦 اسم ولي الأمر</p>
  <input id="parentName">
  <br><br>
  <button onclick="saveNames()">✅ دخول الرحلة</button>
  <div id="regMsg" style="color:#ffd166"></div>
</div>

<!-- المقدمة -->
<div id="intro" class="fullscreen" style="display:none">
  <h1>🧙‍♂️ أسطورة الحكيم نور</h1>
  <p style="font-size:22px">
    نتعلّم الجمع حتى ١٠ 🧮<br>
    بهدوء… وبقلبٍ سعيد ❤️
  </p>
  <button onclick="startLesson()">🚀 ابدأ الرحلة</button>
</div>

<!-- الدرس -->
<div id="lesson" class="box" style="display:none">
  <h2>📜 درس الحكمة</h2>
  <div id="lessonMentor" class="mentor"></div>
  <div id="lessonMsg" class="msg"></div>
  <button onclick="startGame()">🎮 ابدأ التحدي</button>
</div>

<!-- اللعبة -->
<div id="game" class="box" style="display:none">
  <h2>🌟 الجمع حتى ١٠</h2>
  <div id="gameStory" class="story"></div>
  <div id="gameMentor" class="mentor"></div>
  ⭐ النقاط <span id="score">٠</span> |
  🎚 المستوى <span id="level">١</span>
  <div id="question"></div>
  <input id="answer" inputmode="numeric">
  <br><br>
  <button onclick="checkAnswer()">💡 أجيب</button>
  <button class="help" onclick="help()">🧠 مساعدة</button>
  <button class="report" onclick="showReport()">📘 التقرير</button>
  <div id="gameMsg" class="msg"></div>
  <div id="reportBox" class="reportBox"></div>
  <button class="reset" onclick="resetAll()">🔄 إعادة البداية</button>
</div>

<script>
/* أدوات */
const arabic=n=>n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
const toEng=s=>s.replace(/[٠-٩]/g,d=>"0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)]);
const hearts=n=>"<div class='hearts'>"+"<span>❤️</span>".repeat(n)+"</div>";

/* المستويات */
const levels={
  1:"🌱 وادي البدايات",
  2:"🌿 غابة التفكير",
  3:"🌉 جسر الحكمة",
  4:"🏔️ جبل الصبر",
  5:"🏰 قصر الحكيم نور"
};

/* الحالة */
let student="",parent="",lastQ="";
let state={score:0,level:1,streak:0,attempts:0,correct:0};
let x=0,y=0;

/* تحميل */
window.onload=()=>{
  student=localStorage.getItem("student")||"";
  parent=localStorage.getItem("parent")||"";
  const saved=localStorage.getItem("wisdom10");
  if(saved) state=JSON.parse(saved);
  if(student&&parent){
    register.style.display="none";
    intro.style.display="flex";
  }
};

/* حفظ */
const save=()=>localStorage.setItem("wisdom10",JSON.stringify(state));

function saveNames(){
  student=studentName.value.trim();
  parent=parentName.value.trim();
  if(!student||!parent){
    regMsg.textContent="✋ من فضلك اكتب الاسمين";
    return;
  }
  localStorage.setItem("student",student);
  localStorage.setItem("parent",parent);
  register.style.display="none";
  intro.style.display="flex";
}

function startLesson(){
  intro.style.display="none";
  lesson.style.display="block";
  lessonMentor.textContent=`🧙‍♂️ أهلاً بك ${student}`;
  lessonMsg.innerHTML=
   `${parent}، سنتعلّم الجمع حتى ١٠ باستخدام القلوب ❤️<br><br>`+
   hearts(3)+" + "+hearts(2);
}

function startGame(){
  lesson.style.display="none";
  game.style.display="block";
  updateUI();
  newQuestion();
}

function newQuestion(){
  answer.value="";
  gameMsg.textContent="";
  reportBox.style.display="none";
  do{
    x=Math.floor(Math.random()*10);
    y=Math.floor(Math.random()*(10-x)); // ✅ المجموع ≤ 10 دائمًا
  }while(`${x}+${y}`===lastQ || (x===0&&y===0));
  lastQ=`${x}+${y}`;
  question.innerHTML=
   `<div class="math">${arabic(x)} + ${arabic(y)} = ؟</div>
    ${hearts(x)} + ${hearts(y)}`;
}

function checkAnswer(){
  if(!answer.value.trim()){
    gameMsg.textContent="✋ اكتب الإجابة أولًا";
    return;
  }
  state.attempts++;
  const val=parseInt(toEng(answer.value));
  if(val===x+y){
    state.correct++;
    state.score+=10;
    state.streak++;
    gameMsg.textContent="✨ إجابة رائعة!";
    if(state.streak>=3 && state.level<5){
      state.level++;
      state.streak=0;
    }
    if(state.level===5 && state.score>=200){
      gameMsg.innerHTML="🏆 تهانينا! وصلت إلى قصر الحكيم نور ✨";
    }
    save(); updateUI();
    setTimeout(newQuestion,1200);
  }else{
    state.streak=0;
    gameMsg.innerHTML=
     "💛 لا بأس، عدّ القلوب بهدوء ثم حاول مرة أخرى";
  }
}

function help(){
  gameMsg.innerHTML=
   "🧠 عدّ القلوب واحدة واحدة:<br>"+
   hearts(x)+" + "+hearts(y);
}

function showReport(){
  reportBox.style.display="block";
  reportBox.innerHTML=
   `📘 تقرير الحكيم نور<br><br>
    👦 الطالب: ${student}<br>
    ⭐ النقاط: ${arabic(state.score)}<br>
    🎚 المستوى: ${arabic(state.level)}<br>
    ✅ الإجابات الصحيحة: ${arabic(state.correct)} من ${arabic(state.attempts)}`;
}

function updateUI(){
  score.textContent=arabic(state.score);
  level.textContent=arabic(state.level);
  gameStory.textContent=levels[state.level]||"";
  gameMentor.textContent="🧙‍♂️ اجمع بهدوء… وستصل";
}

function resetAll(){
  if(confirm("هل تريد البدء من البداية؟")){
    localStorage.clear();
    location.reload();
  }
}

answer.addEventListener("input",()=>{
  answer.value=answer.value.replace(/[^٠-٩0-9]/g,"");
});
</script>

</body>
</html>
