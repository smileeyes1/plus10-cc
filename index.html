<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>قصة تعليمية للأطفال</title>
  <style>
    body {
      font-family: "Arial", sans-serif;
      background-color: #f0f8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 80%;
      max-width: 600px;
      background: #ffffff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .story-text {
      font-size: 22px;
      line-height: 1.8;
      color: #333;
      margin-bottom: 30px;
      min-height: 120px;
    }

    button {
      font-size: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

<div class="container">
  <div id="story" class="story-text"></div>
  <button id="nextBtn">أنا جاهز 🌟</button>
</div>

<script>
  const storyParts = [
    "كان يا ما كان، عصفورٌ صغير يعيش فوق شجرة عالية، وكان يحب الطيران واللعب.",

    "في يومٍ من الأيام، رأى فراشةً تطير بعيدًا، فشعر بالحماس وقال: أريد أن ألحق بها الآن!",

    "لكن العصفور تذكّر كلام أمّه: فكّر قبل أن تقرّر، واسأل إذا لم تكن متأكدًا.",

    "توقّف العصفور، وفكّر قليلًا، ثم قال: سأطير قليلًا فقط حتى أبقى آمنًا.",

    "طار العصفور وعاد سعيدًا، وقال: التفكير يجعلني ذكيًا، وليس التسرّع.",

    "✨ الحكمة: الطفل الذكي يفكّر، ويسأل، ويختار ما يحميه ويرضي الله."
  ];

  let index = 0;
  const storyDiv = document.getElementById("story");
  const button = document.getElementById("nextBtn");

  storyDiv.textContent = storyParts[index];

  button.addEventListener("click", () => {
    index++;
    if (index < storyParts.length) {
      storyDiv.textContent = storyParts[index];
    } else {
      storyDiv.textContent = "أحسنت 👏 لقد أنهيت القصة. خذ وقتك للتفكير.";
      button.style.display = "none";
    }
  });
</script>

</body>
</html>
