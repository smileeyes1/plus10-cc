<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🧙‍♂️ أسطورة الحكيم نور – جمع حتى ١٠</title>

<style>
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:linear-gradient(#081a30,#0f2d4f);
  color:#fff;
  text-align:center;
}
.fullscreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.box{
  width:540px;
  max-width:95%;
  margin:30px auto;
  padding:22px;
  border-radius:22px;
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 30px #00eaff;
}
button{
  padding:12px 26px;
  font-size:18px;
  border-radius:14px;
  background:#00eaff;
  border:none;
  cursor:pointer;
  margin:6px;
}
button:hover{transform:scale(1.05)}
.reset{background:#ef476f}
.help{background:#ffd166;color:#000}
.report{background:#9bf6ff;color:#000}
.math{font-size:34px;color:#ffe066;margin:10px 0}
.hearts span{font-size:26px}
.mentor{color:#ffd166;font-size:20px;min-height:40px}
.story{color:#06d6a0;font-size:18px;margin-bottom:10px}
.msg{min-height:120px;font-size:18px;white-space:pre-line}
input{
  padding:10px;
  font-size:18px;
  border-radius:12px;
  border:none;
  width:140px;
  text-align:center;
}
.reportBox{
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:16px;
  margin-top:15px;
  display:none;
}
</style>
</head>

<body>

<!-- التسجيل -->
<div id="register" class="fullscreen">
  <h1>📖 سجلّ الرحلة</h1>
  <p>👦 اسم الطالب</p>
  <input id="studentName">
  <p>👨‍👩‍👦 اسم ولي الأمر</p>
  <input id="parentName">
  <br><br>
  <button onclick="saveNames()">✅ دخول الأسطورة</button>
  <div id="regMsg" style="color:#ffd166"></div>
</div>

<!-- المقدمة -->
<div id="intro" class="fullscreen" style="display:none">
  <h1>🧙‍♂️ أسطورة الحكيم نور</h1>
  <p style="font-size:22px">
    الجمع حتى ١٠ 🧮<br>
    التفكير بهدوء 🧠<br>
    الحكمة رحلة ✨
  </p>
  <button onclick="startLesson()">🚀 ابدأ الرحلة</button>
</div>

<!-- الدرس -->
<div id="lesson" class="box" style="display:none">
  <h2>📜 درس الحكمة</h2>
  <div id="lessonMentor" class="mentor"></div>
  <div id="lessonMsg" class="msg"></div>
  <button onclick="startGame()">🎮 ابدأ التحدي</button>
</div>

<!-- اللعبة -->
<div id="game" class="box" style="display:none">
  <h2>🌟 جمع الأعداد حتى ١٠</h2>

  <div class="story" id="gameStory">🌱 بداية الحكمة</div>
  <div class="mentor" id="gameMentor"></div>

  ⭐ النقاط: <span id="score">٠</span> |
  🎚 المستوى: <span id="level">١</span>

  <div id="question"></div>

  <input id="answer" inputmode="numeric">
  <br><br>

  <button onclick="checkAnswer()">💡 أجيب</button>
  <button class="help" onclick="help()">🧠 أحتاج مساعدة</button>
  <button class="report" onclick="showReport()">📘 التقرير</button>

  <div id="gameMsg" class="msg"></div>

  <div class="reportBox" id="reportBox"></div>

  <button class="reset" onclick="resetAll()">🔄 إعادة البداية</button>
</div>

<script>
/* أدوات */
const arabic=n=>n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
const toEng=s=>s.replace(/[٠-٩]/g,d=>"0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)]);
const hearts=n=>"<div class='hearts'>"+"<span>❤️</span>".repeat(n)+"</div>";

/* عناصر */
const register=document.getElementById("register");
const intro=document.getElementById("intro");
const lesson=document.getElementById("lesson");
const game=document.getElementById("game");

const studentInput=document.getElementById("studentName");
const parentInput=document.getElementById("parentName");
const regMsg=document.getElementById("regMsg");

const lessonMentor=document.getElementById("lessonMentor");
const lessonMsg=document.getElementById("lessonMsg");

const question=document.getElementById("question");
const answer=document.getElementById("answer");
const gameMsg=document.getElementById("gameMsg");
const gameMentor=document.getElementById("gameMentor");

const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");
const reportBox=document.getElementById("reportBox");

/* بيانات */
let student="", parent="";
let state={score:0,level:1,streak:0,fails:0};
let x=0,y=0;

/* تحميل */
window.onload=()=>{
  const saved=localStorage.getItem("wisdom10");
  if(saved)state=JSON.parse(saved);
  student=localStorage.getItem("student")||"";
  parent=localStorage.getItem("parent")||"";
  if(student&&parent){
    register.style.display="none";
    intro.style.display="flex";
  }
}

/* حفظ */
function save(){
  localStorage.setItem("wisdom10",JSON.stringify(state));
}

/* تسجيل */
function saveNames(){
  student=studentInput.value.trim();
  parent=parentInput.value.trim();
  if(!student||!parent){
    regMsg.textContent="✋ الرجاء كتابة الاسمين";
    return;
  }
  localStorage.setItem("student",student);
  localStorage.setItem("parent",parent);
  register.style.display="none";
  intro.style.display="flex";
}

/* درس */
function startLesson(){
  intro.style.display="none";
  lesson.style.display="block";
  lessonMentor.textContent=`🧙‍♂️ مرحبًا ${student}`;
  lessonMsg.innerHTML=`${parent}، نعدّ القلوب بهدوء ❤️<br><br>`+
    hearts(3)+" + "+hearts(2);
}

/* لعبة */
function startGame(){
  lesson.style.display="none";
  game.style.display="block";
  updateUI();
  newQuestion();
}

/* سؤال جمع حتى ١٠ */
function newQuestion(){
  answer.value="";
  gameMsg.textContent="";
  reportBox.style.display="none";
  x=Math.floor(Math.random()*10);
  y=Math.floor(Math.random()*(10-x));
  gameMentor.textContent="🧙‍♂️ فكّر بهدوء وعدّ القلوب";
  question.innerHTML=
   `<div class="math">${arabic(x)} + ${arabic(y)} = ؟</div>
    ${hearts(x)} + ${hearts(y)}`;
}

/* تحقق */
function checkAnswer(){
  if(!answer.value.trim()){
    gameMsg.textContent="✋ اكتب الإجابة أولًا";
    return;
  }
  const val=parseInt(toEng(answer.value));
  if(val===x+y){
    state.score+=10;
    state.streak++;
    state.fails=0;
    gameMsg.textContent="✨ ممتاز! أحسنت التفكير";
    if(state.streak>=3){
      state.level++;
      state.streak=0;
    }
    save();
    updateUI();
    setTimeout(newQuestion,1200);
  }else{
    state.fails++;
    state.streak=0;
    gameMsg.textContent="💛 لا بأس، نحاول مرة أخرى";
    if(state.fails>=2){
      help();
    }
    if(state.fails>=4){
      gameMsg.innerHTML=`✅ الحل الصحيح:<br>${arabic(x)} + ${arabic(y)} = ${arabic(x+y)}`;
    }
    save();
  }
}

/* مساعدة */
function help(){
  gameMsg.innerHTML=
    "🧠 عدّ القلوب:<br>"+hearts(x+y);
}

/* تقرير */
function showReport(){
  reportBox.style.display="block";
  reportBox.innerHTML=
`📘 تقرير الحكيم نور<br><br>
👦 الطالب: ${student}<br>
⭐ النقاط: ${arabic(state.score)}<br>
🎚 المستوى: ${arabic(state.level)}`;
}

/* تحديث */
function updateUI(){
  scoreEl.textContent=arabic(state.score);
  levelEl.textContent=arabic(state.level);
}

/* إعادة */
function resetAll(){
  localStorage.clear();
  location.reload();
}

/* أرقام فقط */
answer.addEventListener("input",()=>{
  answer.value=answer.value.replace(/[^٠-٩0-9]/g,"");
});
</script>

</body>
</html>
