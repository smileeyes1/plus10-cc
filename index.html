<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مرحلة تعليمية للجمع - الحكيم نور 🧙‍♂️</title>
<style>
body{margin:0;font-family:Tahoma;background:linear-gradient(#a0e7ff,#b4f8c8);display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;}
#welcome,#lesson,#game{width:700px;max-width:95%;background:rgba(255,255,255,0.9);padding:25px;border-radius:20px;text-align:center;position:relative;}
input{font-size:22px;width:200px;padding:8px;border-radius:10px;border:1px solid #ccc;text-align:center;margin:5px;}
button{padding:10px 20px;margin:5px;border:none;border-radius:12px;background:#ffd166;cursor:pointer;font-size:16px;}
.character{font-size:70px;transition:0.3s;}
.jump{transform:translateY(-20px) rotate(-15deg);}
.star{position:absolute;font-size:20px;animation:boom 1s forwards;}
@keyframes boom{to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}}
.item{font-size:50px;margin:5px;}
.number{font-size:36px;font-weight:bold;color:#ff6b6b;margin:5px;}
.progress{width:100%;background:#eee;border-radius:10px;margin:10px 0;}
.bar{height:20px;background:#ffd166;width:0%;border-radius:10px;}
</style>
</head>
<body>

<!-- شاشة الترحيب -->
<div id="welcome">
<h2>مرحباً بك في مغامرة الحكيم نور 🧙‍♂️!</h2>
<p>أدخل اسمك لنبدأ التعلم:</p>
<input id="studentName" placeholder="اسم الطفل"><br>
<button onclick="startLesson()">لنبدأ التعلم 🎓</button>
</div>

<!-- المرحلة التعليمية -->
<div id="lesson" style="display:none;">
<div class="character" id="char">🧙‍♂️</div>
<h2>تعلم الجمع مع الحكيم نور 🧙‍♂️</h2>
<div id="story" class="item"></div>
<div id="visual"></div>
<div id="numbers" class="number"></div>
<button id="nextBtn" onclick="nextStep()" style="display:none;">التالي ➡️</button>
</div>

<!-- اللعبة الرئيسية -->
<div id="game" style="display:none;">
<h2>الآن نلعب ونحسب! 🎮</h2>
<p>⭐ النقاط: <span id="score">٠</span> | 🎚 المستوى: <span id="level">١</span></p>
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="story" id="gameStory"></div>
<div class="visual" id="gameVisual"></div>
<input id="answer" placeholder="اكتب الرقم هنا"><br>
<button onclick="check()">أجب</button>
<button onclick="hint()">تلميح</button>
<div id="msg"></div>
<div id="explain"></div>
</div>

<script>
// عناصر
const q=id=>document.getElementById(id);
let student="",step=0,steps=[],x=0,y=0,correct=0;

// بيانات المرحلة التعليمية
steps=[
  {text:"مرحباً يا {name}! أنا الحكيم نور 🧙‍♂️ وسأعلمك الجمع اليوم!",items:[]},
  {text:"انظر! لدي تفاحة واحدة 🍎",items:["🍎"]},
  {text:"الآن أضفت تفاحة أخرى 🍎، كم أصبح معي؟",items:["🍎","🍎"]},
  {text:"دعنا نعدها معاً: واحد… اثنان!",items:["🍎","🍎"],numbers:["١","٢"]},
  {text:"رائع! أنت فهمت الجمع، الآن هيا لنلعب!",items:[]}
];

// تحويل الأرقام العربية
function arabic(n){return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);}
function parseArabicNumber(str){return parseInt(str.replace(/[٠-٩]/g,d=>"٠١٢٣٤٥٦٧٨٩".indexOf(d)));}

// الصوت
function speakText(text,rate=1,pitch=1){
  speechSynthesis.cancel();
  let u=new SpeechSynthesisUtterance(text);
  u.lang="ar-SA";
  u.rate=rate;
  u.pitch=pitch;
  speechSynthesis.speak(u);
}

// ابدأ المرحلة التعليمية
function startLesson(){
  student=q("studentName").value.trim() || "طفلي";
  q("welcome").style.display="none";
  q("lesson").style.display="block";
  step=0;
  showStep();
  setTimeout(()=>{q("nextBtn").style.display="inline-block";},2000);
}

// عرض خطوة
function showStep(){
  let s=steps[step];
  q("story").innerHTML=s.text.replace("{name}",student);
  q("visual").innerHTML=s.items.map(i=>`<span class="item">${i}</span>`).join("");
  q("numbers").innerHTML=s.numbers ? s.numbers.join(" ") : "";
  if(step>0) q("nextBtn").style.display="inline-block"; else q("nextBtn").style.display="none";
  speakText(s.text.replace("{name}",student),1,1);
}

// التالي في الشرح
function nextStep(){
  step++;
  if(step>=steps.length){
    startGame();
    return;
  }
  showStep();
}

// ---------- اللعبة ----------
let score=0,level=1,progress=0,difficulty=1,wrong=0,hintCount=0;
const items=["🍎","⭐","🍬","🍌"];

function startGame(){
  q("lesson").style.display="none";
  q("game").style.display="block";
  score=0; level=1; progress=0; difficulty=1;
  newQ();
  update();
}

function newQ(){
  let maxY = Math.min(10-x, difficulty*2);
  if(maxY<1) maxY=1;
  x=Math.floor(Math.random()*5)+1;
  y=Math.floor(Math.random()*maxY)+1;
  correct=x+y;
  let item=items[Math.floor(Math.random()*items.length)];
  q("gameStory").innerHTML=`${student}، لديك ${arabic(x)} ${item} ثم أضفت ${arabic(y)} أخرى. كم مجموعها؟`;
  q("gameVisual").innerHTML=item.repeat(x)+" + "+item.repeat(y);
  q("answer").value="";
  q("msg").innerHTML="";
  q("explain").innerHTML="";
  hintCount=0;
}

function check(){
  let v=q("answer").value.trim();
  if(!v){q("msg").innerHTML=`اكتب الرقم يا ${student}!`; speakText("اكتب الرقم من فضلك"); return;}
  if(!/^[0-9٠-٩]+$/.test(v)){q("msg").innerHTML="اكتب رقماً صحيحاً"; speakText("الرجاء كتابة رقم صحيح"); return;}
  v=parseArabicNumber(v);
  if(v===correct){
    score+=10; progress+=20; wrong=0;
    q("msg").innerHTML=`🌟 أحسنت يا ${student}!`;
    q("explain").innerHTML=`${arabic(x)} + ${arabic(y)} = ${arabic(correct)}`;
    speakText(`رائع! أحسنت يا ${student}`);
    if(progress>=100){level++;progress=0;difficulty++;q("msg").innerHTML+=`<br>🎉 لقد انتقلت لمستوى جديد!`;}
    update();
    setTimeout(newQ,2000);
  } else {
    wrong++;
    q("msg").innerHTML=`حاول مرة أخرى يا ${student} 🌱`;
    speakText("لا بأس، جرب مرة أخرى!");
  }
}

function hint(){
  hintCount++;
  if(hintCount===1){q("msg").innerHTML=`ابدأ بالعد من ${arabic(x)}`; speakText("ابدأ بالعد من "+arabic(x));}
  else if(hintCount===2){q("msg").innerHTML="الجمع يعني جمع الأشياء معاً لتعرف الكل"; speakText("الجمع يعني جمع الأشياء معاً");}
  else {q("msg").innerHTML="هذا كل ما لدي من تلميحات"; speakText("هذا كل ما لدي من تلميحات");}
}

function update(){
  q("score").innerHTML=arabic(score);
  q("level").innerHTML=arabic(level);
  q("bar").style.width=progress+"%";
}

document.addEventListener("keydown",e=>{if(e.key==="Enter")check();});
</script>

</body>
</html>
