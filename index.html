<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسطورة الحكيم نور – نسخة مصححة</title>

<style>
body{
 margin:0;
 font-family:Tahoma;
 background:radial-gradient(circle at top,#0f2b4a,#05121f);
 color:#fff;
 text-align:center;
}
.box{
 width:640px;
 max-width:95%;
 margin:20px auto;
 padding:25px;
 border-radius:25px;
 background:rgba(255,255,255,0.1);
 box-shadow:0 0 30px rgba(0,230,255,0.3);
}
button{
 padding:12px 25px;
 border:none;
 border-radius:15px;
 margin:6px;
 font-size:18px;
 cursor:pointer;
 background:#00eaff;
}
.math{font-size:45px;color:#ffe066}
.enemy{font-size:22px;color:#ff6b6b}
.assistant{color:#a0e7ff}
</style>
</head>

<body>

<div class="box">

<h2>🌟 الجمع حتى ١٠</h2>

⭐ النقاط: <span id="score">٠</span>  
🎚 المستوى: <span id="level">١</span>

<div class="enemy">👾 صحة الوحش: <span id="enemy">٢٠</span></div>

<div class="math" id="question"></div>
<div class="assistant" id="visual"></div>

<input id="answer" placeholder="٥">
<br><br>

<button onclick="check()">أجيب</button>
<button onclick="help()">تلميح</button>
<button onclick="speak()">🎤 اقرأ</button>

<div id="msg"></div>
<div id="helper" class="assistant"></div>

</div>

<audio id="success" src="https://assets.mixkit.co/sfx/preview/mixkit-fairy-arcade-sparkle-866.mp3"></audio>
<audio id="fail" src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3"></audio>

<script>

const q = id => document.getElementById(id);

const arabic = n => n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
const toEng = s => s.replace(/[٠-٩]/g,d=>"0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)]);

let x,y;
let score=0, level=1, streak=0;
let enemy=20;

const MAX_LEVEL = 4;

// تحديد المستوى
function maxLevel(l){
 if(l==1)return 4;
 if(l==2)return 6;
 if(l==3)return 8;
 return 9;
}

// توليد سؤال (مضمون <= ١٠)
function newQ(){
 let max = maxLevel(level);
 x = Math.floor(Math.random()*max)+1;

 // 🔥 الإصلاح الحقيقي
 y = Math.floor(Math.random()*(10 - x)) + 1;

 q("question").innerHTML = arabic(x)+" + "+arabic(y);

 // تمثيل بصري
 q("visual").innerHTML = "⭐".repeat(x)+" + "+"⭐".repeat(y);

 q("answer").value="";
 q("msg").innerHTML="";
 q("helper").innerHTML="";
}

// التحقق
function check(){
 let v = q("answer").value.trim();

 if(!/^[٠-٩]+$/.test(v)){
  q("msg").innerHTML="اكتب بالأرقام العربية";
  return;
 }

 v = parseInt(toEng(v));
 let c = x+y;

 if(v===c){

  document.getElementById("success").play();

  score+=10;
  streak++;
  enemy-=5;

  let msg="🌟 أحسنت";

  // الوحش
  if(enemy<=0){
    msg+="<br>⚔️ هزمت الوحش!";
    enemy=20;
  }

  // رفع مستوى (مع حد أقصى)
  if(streak==5 && level < MAX_LEVEL){
    level++;
    streak=0;
    msg+="<br>🎉 مستوى جديد!";
  }

  // وسام
  if(score % 50 === 0){
    msg+="<br>🏅 وسام جديد!";
  }

  q("msg").innerHTML=msg;

 }else{

  document.getElementById("fail").play();

  streak=0;

  // ✅ مساعد بصري صحيح
  q("helper").innerHTML =
    "انظر:<br>" +
    "⭐".repeat(x) + " + " + "⭐".repeat(y) +
    "<br>= " + "⭐".repeat(c);

  q("msg").innerHTML="حاول مرة أخرى";
 }

 update();
 setTimeout(newQ,1500);
}

// تلميح
function help(){
 let s=x+y;
 let hint = s<=5 ? "الجواب صغير" : s<=7 ? "متوسط" : "كبير";
 q("msg").innerHTML="تلميح: "+hint;
}

// قراءة الصوت بالعربية
function speak(){
 let u = new SpeechSynthesisUtterance(x+" زائد "+y);
 u.lang = "ar-SA"; // ✅ إصلاح اللغة
 speechSynthesis.speak(u);
}

// تحديث
function update(){
 q("score").innerHTML=arabic(score);
 q("level").innerHTML=arabic(level);
 q("enemy").innerHTML=arabic(enemy);
}

newQ();

</script>

</body>
</html>
