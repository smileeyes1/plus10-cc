<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧙‍♂️ أسطورة الحكيم نور – الجمع حتى ١٠</title>

<style>
body{
  margin:0;
  font-family:Tahoma,Arial;
  background:radial-gradient(circle at top,#1b4965,#081a30);
  color:#fff;
  text-align:center;
  min-height:100vh;
  overflow-x:hidden
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/7bKQ7mP.png");
  opacity:.12;
  animation:float 90s linear infinite;
  z-index:-1
}

@keyframes float{
  to{background-position:-2000px 2000px}
}

.fullscreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center
}

.box{
  width:560px;
  max-width:95%;
  margin:20px auto;
  padding:22px;
  border-radius:26px;
  background:rgba(255,255,255,.1);
  box-shadow:0 0 35px #00eaff
}

button{
  padding:12px 26px;
  font-size:18px;
  border-radius:16px;
  border:none;
  cursor:pointer;
  margin:6px;
  background:#00eaff;
  transition:.25s
}

button:hover{transform:scale(1.08)}
.help{background:#ffd166;color:#000}
.reset{background:#ef476f}
.report{background:#9bf6ff;color:#000}

.math{font-size:36px;color:#ffe066}

.mentor{
  color:#ffd166;
  font-size:20px;
  min-height:42px
}

.story{color:#06d6a0;font-size:20px}

.msg{
  min-height:120px;
  white-space:pre-line;
  line-height:1.8
}

input{
  padding:10px;
  font-size:18px;
  border-radius:14px;
  border:none;
  width:180px;
  text-align:center
}

/* 💖 القلوب الذكية */
.hearts{
  display:inline-block;
  margin:10px 4px
}

.hearts span{
  font-size:28px;
  display:inline-block;
  animation:
    beat 1.8s ease-in-out infinite,
    sway 4s ease-in-out infinite;
}

@keyframes beat{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.3)}
}

@keyframes sway{
  0%,100%{margin-top:0}
  50%{margin-top:-6px}
}

.reportBox{
  background:rgba(0,0,0,.55);
  padding:15px;
  border-radius:18px;
  margin-top:15px;
  display:none
}
</style>
</head>

<body>

<!-- 🔊 صوت النجاح -->
<audio id="successSound" preload="auto">
  https://assets.mixkit.co/sfx/preview/mixkit-fairy-arcade-sparkle-866.mp3
</audio>

<!-- التسجيل -->
<div id="register" class="fullscreen">
  <h1>📖 سجل الرحلة</h1>
  👦 اسم الطالب<br>
  <input id="studentName"><br><br>
  👨‍👩‍👦 اسم ولي الأمر<br>
  <input id="parentName"><br><br>
  <button onclick="saveNames()">✅ دخول الرحلة</button>
  <div id="regMsg" style="color:#ffd166"></div>
</div>

<!-- المقدمة -->
<div id="intro" class="fullscreen" style="display:none">
  <h1>🧙‍♂️ أسطورة الحكيم نور</h1>
  <p style="font-size:22px">
    نتعلم الجمع حتى ١٠ 🧮<br>
    بالقيم… وبقلبٍ مطمئن ❤️
  </p>
  <button onclick="startLesson()">🚀 ابدأ الرحلة</button>
</div>

<!-- الدرس -->
<div id="lesson" class="box" style="display:none">
  <h2>📜 درس الحكمة</h2>
  <div class="mentor" id="lessonMentor"></div>
  <div class="msg">
    🕌 طلب العلم عبادة<br>
    💛 الله يحب المحسنين<br>
    ❤️ نعد بهدوء ونفهم برفق
  </div>
  <button onclick="startGame()">🎮 ابدأ التحدي</button>
</div>

<!-- اللعبة -->
<div id="game" class="box" style="display:none">
  <h2>🌟 الجمع حتى ١٠</h2>
  <div class="story" id="gameStory"></div>
  <div class="mentor" id="gameMentor"></div>

  ⭐ النقاط <span id="score">٠</span> |
  🎚 المستوى <span id="level">١</span>

  <div id="question"></div>
  <input id="answer" inputmode="numeric" maxlength="2"><br><br>

  <button onclick="check()">💡 أجيب</button>
  <button class="help" onclick="help()">🧠 مساعدة</button>
  <button class="help" onclick="dailyValue()">🌸 قيمة اليوم</button>
  <button class="report" onclick="report()">📘 التقرير</button>

  <div class="msg" id="msg"></div>
  <div class="reportBox" id="reportBox"></div>

  <button class="reset" onclick="resetAll()">🔄 إعادة</button>
</div>

<script>
const arabic=n=>n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
const toEng=s=>s.replace(/[٠-٩]/g,d=>"0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)]);

const hearts=n=>{
 let h="";
 for(let i=0;i<n;i++){
  h+=`<span style="
    animation-delay:${Math.random()*1.5}s;
    transform:translateY(${Math.random()*6}px)
  ">❤️</span>`;
 }
 return `<div class="hearts">${h}</div>`;
};

const pick=a=>a[Math.floor(Math.random()*a.length)];

const values={
 success:[
  "🌟 الله يحب المجتهدين",
  "💛 نية طيبة وعمل حسن",
  "🕌 العلم يقربنا من الله"
 ],
 try:[
  "🌱 الخطأ طريق الفهم",
  "⌛ الصبر مفتاح الخير",
  "💛 المحاولة أجر"
 ],
 daily:[
  "🕌 قل: الحمد لله",
  "🤝 التعاون سر القوة",
  "👨‍👩‍👦 بر الوالدين نور",
  "🌸 الصدق طمأنينة"
 ]
};

const levels={
1:"🌱 وادي البدايات",
2:"🌿 طريق الصبر",
3:"🌉 جسر التعاون",
4:"🏔️ جبل الاجتهاد",
5:"🏰 قصر الحكيم نور"
};

let student="",parent="",x=0,y=0;
let state={score:0,level:1,streak:0,attempts:0,correct:0};

window.onload=()=>{
 if(localStorage.state) state=JSON.parse(localStorage.state);
 student=localStorage.student||"";
 parent=localStorage.parent||"";
 if(student&&parent){
  register.style.display="none";
  intro.style.display="flex";
 }
};

function saveNames(){
 student=studentName.value.trim();
 parent=parentName.value.trim();
 if(!student||!parent){
  regMsg.textContent="✋ اكتب الاسمين";
  return;
 }
 localStorage.student=student;
 localStorage.parent=parent;
 register.style.display="none";
 intro.style.display="flex";
}

function startLesson(){
 intro.style.display="none";
 lesson.style.display="block";
 lessonMentor.textContent="🧙‍♂️ مرحبًا بك يا "+student;
}

function startGame(){
 lesson.style.display="none";
 game.style.display="block";
 update();
 newQ();
}

function newQ(){
 answer.value="";
 msg.textContent="";
 x=Math.floor(Math.random()*10);
 y=Math.floor(Math.random()*(10-x));
 question.innerHTML=
 `<div class="math">${arabic(x)} + ${arabic(y)} = ؟</div>`+
 hearts(x)+" + "+hearts(y);
}

function check(){
 if(!answer.value)return;
 state.attempts++;
 if(parseInt(toEng(answer.value))===x+y){
  successSound.currentTime=0;
  successSound.play();
  state.correct++;
  state.score+=10;
  state.streak++;
  msg.textContent="✨ أحسنت\n"+pick(values.success);
  if(state.streak>=3 && state.level<5){
   state.level++;
   state.streak=0;
   msg.textContent+="\n🌟 ترقيت بحكمتك";
  }
  update();
  setTimeout(newQ,1400);
 }else{
  state.streak=0;
  msg.textContent=pick(values.try);
  setTimeout(newQ,1600);
 }
}

function help(){
 msg.innerHTML="🧠 عد القلوب بهدوء<br>"+hearts(x)+" + "+hearts(y);
}

function dailyValue(){
 msg.textContent=pick(values.daily);
}

function report(){
 reportBox.style.display="block";
 reportBox.innerHTML=
 `👦 ${student}<br>
  ⭐ النقاط: ${arabic(state.score)}<br>
  ✅ صحيحة: ${arabic(state.correct)} / ${arabic(state.attempts)}<br>
  🎚 المستوى: ${arabic(state.level)}`;
}

function update(){
 score.textContent=arabic(state.score);
 level.textContent=arabic(state.level);
 gameStory.textContent=levels[state.level];
 gameMentor.textContent="🧙‍♂️ تعلم بتؤدة وستبلغ الحكمة";
 localStorage.state=JSON.stringify(state);
}

function resetAll(){
 if(confirm("هل تريد البدء من جديد؟")){
  localStorage.clear();
  location.reload();
 }
}
</script>

</body>
</html>
